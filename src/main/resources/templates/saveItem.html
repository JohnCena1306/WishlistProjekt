<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout}">

<body>
<div th:fragment="content">

    <h2 class="sub-title">Opret nyt ønske</h2>

    <p th:if="${error}" th:text="${error}" style="color:red; font-weight:bold;"></p>

    <form th:action="@{/saveItem}" th:object="${item}" method="post">

        <input type="hidden" id="id" th:field="*{id}">
        <input type="hidden" th:field="*{imageUrl}">

        <label for="wishlistId">Vælg ønskeliste:</label>
        <select id="wishlistId" th:field="*{wishlistId}" required>
            <option value="">-- Vælg ønskeliste --</option>
            <option th:each="wishlist : ${wishlists}"
                    th:value="${wishlist.id}"
                    th:text="${wishlist.title}">
            </option>
        </select><br><br>

        <label for="name">Titel:</label>
        <input type="text"
               id="name"
               th:field="*{name}"
               placeholder="Hvad ønsker du dig?"><br><br>

        <label for="description">Beskrivelse:</label>
        <input type="text"
               id="description"
               th:field="*{description}"
               placeholder="Ekstra info"><br><br>

        <label for="price">Pris:</label>
        <input type="number"
               id="price"
               th:field="*{price}"
               placeholder="Ca. pris"><br><br>

        <label for="link">Produktlink:</label>
        <input type="text"
               id="link"
               th:field="*{link}"
               placeholder="Indsæt link"><br><br>

        <button class="button" type="submit">Gem</button>
        <a class="button-secondary" th:href="@{/show}">Annuller</a>
    </form>
</div>
</body>
</html>
