<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Items</title>
</head>
<body>

<div th:replace="fragments/header :: header"></div>
<h2>Ønsker på 'wishlist title'</h2>
<div th:each="item : ${items}">

    <br>
    <hr>
    <p th:text="${item.getName()}"></p>
    <p th:text="${item.getDescription()}"></p>
    <p th:text="${item.getPrice()}"></p>
    <a th:href="${item.getLink()}">Link</a>
    <hr>
    <br>

</div>

</body>
</html>
