<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      th:replace="~{layout :: layout}">

<body>
<div th:fragment="content">

    <h2 class="sub-title">Opret et nyt ønske til din ønskeliste!</h2>

<form th:action="@{/saveItem}" th:object="${item}" method="post">

    <input type="hidden" id="id" th:field="*{id}">
    <input type="hidden" id="wishlistId" th:field="*{wishlistId}">

    <label for="wishlistId">Vælg ønskeliste:</label>
    <select id="wishlistId" th:field="*{wishlistId}" required>
        <option value="">-- Vælg ønskeliste --</option>
        <option th:each="wishlist : ${wishlists}"
                th:value="${wishlist.id}"
                th:text="${wishlist.title}">
        </option>
    </select><br><br>

    <label for="name">Titel:</label>
    <div class="form-row"><label for="name">Titel:</label>
    <input type="text"
           placeholder="Hvad ønsker du dig?"
           id="name"
           th:field="*{name}"></div>

    <divs class="form-row"><label for="description">Ønske beskrivelse:</label>
    <input type="text"
           placeholder="Ekstra info (fx farve, model)"
           id="description"
           th:field="*{description}"></divs>

    <div class="form-row"><label for="price">Pris:</label>
        <input type="number"
           placeholder="Ca. pris"
           id="price"
           th:field="*{price}"></div>

    <div class="form-row"><label for="link">Produktlink:</label>
    <input type="text"
           placeholder="Indsæt link til produkt"
           id="link"
           th:field="*{link}"></div>

    <button class="button" type="submit">Gem</button>
    <a class="button-secondary" th:href="@{/}">Annuller</a>
</form>
</div>
</body>
</html>
